name: Lint GitHub Actions workflows
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]
permissions:
  contents: read
jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # ratchet:actions/checkout@v4
        with:
          persist-credentials: false
      - name: Check workflow files
        uses: docker://index.docker.io/rhysd/actionlint@sha256:887a259a5a534f3c4f36cb02dca341673c6089431057242cdc931e9f133147e9 # ratchet:docker://rhysd/actionlint:latest
        with:
          args: -color
