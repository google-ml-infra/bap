# A workflow to test clang-format composite action

name: Test CI Clang-format Action
# Run on pull_request
on:
  pull_request:
    paths:
    - ci_clangformat/**
    - tests/ci_clangformat/**
    - .github/workflows/check-clang-format.yaml
    branches:
      - main
  push:
    paths:
    - ci_clangformat/**
    - tests/ci_clangformat/**
    - .github/workflows/check-clang-format.yaml
    branches:
      - main
defaults:
  run:
    shell: bash

permissions: {}

jobs:
  run-clang-format:
    runs-on: "linux-x86-n2-16"
    container: "us-central1-docker.pkg.dev/tensorflow-sigs/tensorflow/ml-build:latest"
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: "Run clang-format action"
        uses: ./ci_clangformat/
        with:
          filepaths: "tests/ci_clangformat/formatted_files/*.h tests/ci_clangformat/formatted_files/*.cc"
      - name: "Run clang-format with no matching files"
        uses: ./ci_clangformat/
        with:
          filepaths: "tests/ci_clangformat/no_cc_files/**" # directory that contains no .cc or .h files
