# Workflow to continuously regenerate the data for the ci dashboard
name: Generate dashboard data
permissions: {}
on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - ci_dashboard/data_query/**
      - .github/workflows/generate-dashboard-data.yaml
    branches:
      - main
jobs:
  generate-json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.24.0
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      # Get values for cache paths t∏o be used in later steps
      - id: cache-paths
        run: |
          echo "go-cache=$(go env GOCACHE)" >> "$GITHUB_OUTPUT"
          echo "go-mod-cache=$(go env GOMODCACHE)" >> "$GITHUB_OUTPUT"
      - name: Cache go modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ${{ steps.cache-paths.outputs.go-cache }}
            ${{ steps.cache-paths.outputs.go-mod-cache }}
          key: ubuntu-latest-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ubuntu-latest-go-
      - name: Run the data generation
        env:
          GITHUB_REPOSITORY_ORG: jax-ml
          GITHUB_REPOSITORY_NAME: jax
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          cd ci_dashboard/data_query
          go run main.go
  generate-angular:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # ratchet:actions/setup-node@v6.4.0
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ci_dashboard/frontend/package-lock.json
      - name: Install dependencies
        working-directory: ci_dashboard/frontend
        run: npm ci
      # - name: Run Tests
      #   run: npm test
      - name: Build app
        working-directory: ci_dashboard/frontend
        run: npm run build
      - name: Move files
        working-directory: ci_dashboard/frontend
        shell: bash
        run: |
          mv dist/ci-dashboard/3rdpartylicenses.txt dist/ci-dashboard/browser
          ls -la dist/ci-dashboard
      - name: Upload Pages
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # ratchet:actions/upload-artifact@v4
        with:
          id: deployment
          path: ci_dashboard/frontend/dist/ci-dashboard/browser
  upload-site:
    if: github.event_name == 'push'
    needs: generate-angular
    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write # to deploy to Pages
      id-token: write # to verify the deployment originates from an appropriate source
    # Deploy to the github-pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # Specify runner + deployment step
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # ratchet:actions/deploy-pages@v5.0.0





