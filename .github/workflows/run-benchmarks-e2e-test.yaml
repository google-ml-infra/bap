# This workflow is an end-to-end integration test for the
# run-benchmarks.yaml reusable workflow.
name: Benchmark workflow e2e test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - '**'
      - '.github/workflows/run-benchmarks-e2e-test.yaml'
      - '.github/workflows/run-benchmarks.yaml'
  workflow_dispatch:
    inputs:
      custom_metadata:
        description: "JSON string of metadata to append (e.g., for MLCompass tracking)"
        required: false
        type: string
        default: "{}"
      benchmark_filter:
        description: "Regex to filter by benchmark name (e.g., 'attention.*')."
        required: false
        type: string
        default: ""
      environment_filter:
        description: "Regex to filter by environment configuration ID (e.g., 'b200.*')."
        required: false
        type: string
        default: ""

# Cancel any previous runs on the same branch when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  run_standard_e2e_test:
    name: Standard E2E Test
    permissions:
      contents: read
      pull-requests: write
    uses: ./.github/workflows/run-benchmarks.yaml
    with:
      registry_file: "e2e_test/test_registry.pbtxt"
      tag_filter: "e2e-test"
      custom_metadata: ${{ inputs.custom_metadata }}
      benchmark_filter: ${{ inputs.benchmark_filter }}
      environment_filter: ${{ inputs.environment_filter }}

  run_ab_e2e_test:
    name: A/B Mode E2E Test
    permissions:
      contents: read
      pull-requests: write 
    uses: ./.github/workflows/run-benchmarks.yaml
    with:
      registry_file: "e2e_test/test_registry.pbtxt"
      benchmark_filter: "e2e_bazel_benchmark"
      ab_mode: true
      post_pr_comment: true
      custom_metadata: ${{ inputs.custom_metadata }}

  run_custom_env_e2e_test:
    name: Custom Env E2E Test
    permissions:
      contents: read
      pull-requests: write
    uses: ./.github/workflows/run-benchmarks.yaml
    with:
      registry_file: "e2e_test/test_registry.pbtxt"
      benchmark_filter: "e2e_python_benchmark_summary_v2"
      custom_env_vars: |
        E2E_TEST_VAR=hello_from_e2e_test
        ANOTHER_VAR=123
      custom_metadata: ${{ inputs.custom_metadata }}
