# Reusable workflow to run benchmarks defined in a benchmark registry.
#
# This workflow generates and executes a parallel matrix of benchmark jobs
# based on the provided registry_file and filters.
#
# Note that GITHUB_WORKSPACE env var is used instead of github.workspace
# context reference due to https://github.com/actions/runner/issues/2058.
# Specifically, github.workspace and runner.workspace don't point to container
# valid paths when executing inside a container job.
name: Run benchmarks

on:
  workflow_call:
    inputs:
      registry_file:
        description: "Path to the .pbtxt benchmark registry file, relative to the repository root."
        required: true
        type: string
      benchmark_filter:
        description: "Regex to filter by benchmark name (e.g. 'resnet.*')."
        required: false
        type: string
        default: ""
      environment_filter:
        description: "Regex to filter by environment configuration ID (e.g. 'a100.*')."
        required: false
        type: string
        default: ""
      tag_filter:
        description: "Space-separated list of tags. Benchmarks and/or environment configs must match at least one (e.g. 'gpu')."
        required: false
        type: string
        default: ""
      bap_ref:
        description: >
          The branch, tag, or SHA of google-ml-infra/bap to use. Defaults to 'main'.
          Note: For runs triggered from within the google-ml-infra/bap repo
          (e.g., a PR), the commit SHA (github.sha) is used automatically to test changes.
        required: false
        type: string
        default: ""
      publish_metrics:
        description: "If true, publishes benchmark results to Google Cloud Pub/Sub."
        required: false
        type: boolean
        default: false
      pub_sub_gcp_project_id:
        description: "Google Cloud project ID for Pub/Sub."
        required: false
        type: string
        default: "ml-oss-benchmarking-production"
      pub_sub_gcp_topic_id:
        description: "Pub/Sub topic ID to publish results to."
        required: false
        type: string
        default: "public-results-prod"
      ab_mode:
        description: "If true, runs A/B comparison (baseline vs experiment) and generates an A/B report."
        required: false
        type: boolean
        default: false
      experiment_ref:
        description: "Git ref for the experiment in A/B mode. Defaults to current commit SHA."
        required: false
        type: string
        default: ""
      baseline_ref:
        description: "Git ref for the baseline in A/B mode. Defaults to PR base or main."
        required: false
        type: string
        default: ""
      post_pr_comment:
        description: "If true, posts the benchmark report as a sticky comment on the PR."
        required: false
        type: boolean
        default: false
      job_id:
        description: "A unique identifier for the top-level job (e.g. 'e2e-test'). Used to namespace artifacts. If empty, a random ID is generated."
        required: false
        type: string
        default: ""
      runner:
        description: "The runner label to use for standard jobs."
        required: false
        type: string
        default: "linux-x86-n2-16"
      custom_env_vars:
        description: "Multi-line string of environment variables to inject into the workflow environment (formatted like a .env file)."
        required: false
        type: string
        default: ""
      custom_metadata:
        description: "JSON string of metadata to append to the benchmark result. Overwrites static metadata from the registry but is overwritten by dynamic metadata from the workload."
        required: false
        type: string
        default: "{}"

    outputs:
      job_id:
        description: "Unique identifier for the top-level job."
        value: ${{ jobs.generate_matrix.outputs.job_id }}

permissions:
  contents: read # Required for actions/checkout.
  pull-requests: write # Required for posting PR comments.

jobs:
  validate_registry:
    name: Validate registry security
    runs-on: ${{ inputs.runner }}
    container:
      image: us-docker.pkg.dev/ml-oss-artifacts-published/ml-public-container/ml-build:latest@sha256:fa95dacafd53199ab68e3c28c488c0cc0d5fad3a4b0ac20af27f2bd0a061a55d # ratchet:us-docker.pkg.dev/ml-oss-artifacts-published/ml-public-container/ml-build:latest
    steps:
      - name: Check out user repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # ratchet:actions/checkout@v7.0.0 # zizmor: ignore[unpinned-uses]
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.sha }}
          path: user_repo
          persist-credentials: false

      - name: Resolve BAP ref
        id: resolve_refs
        shell: bash
        env:
          # If we are in the bap repo itself, use the current SHA.
          # Otherwise, prefer bap_ref, then default to main.
          BAP_REF: ${{ github.repository == 'google-ml-infra/bap' && github.sha || inputs.bap_ref || 'main' }}
        run: |
          echo "bap_ref=$BAP_REF" >> "$GITHUB_OUTPUT"

      - name: Check out BAP repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # ratchet:actions/checkout@v7.0.0 # zizmor: ignore[unpinned-uses]
        with:
          repository: "google-ml-infra/bap"
          ref: ${{ steps.resolve_refs.outputs.bap_ref }}
          path: ml_actions
          persist-credentials: false

      - name: Run security suite
        working-directory: ml_actions
        shell: bash
        env:
          REGISTRY_FILE: ${{ inputs.registry_file }}
        run: |
          echo "::group::Run security suite"
          set -euo pipefail

          # Validate registry file
          REGISTRY_PATH="$GITHUB_WORKSPACE/user_repo/$REGISTRY_FILE"
          bazel run //validate_registry:validate_registry -- "$REGISTRY_PATH"
          echo "::endgroup::"

  generate_matrix:
    name: Generate matrix
    needs: [validate_registry]
    runs-on: ${{ inputs.runner }}
    container:
      image: us-docker.pkg.dev/ml-oss-artifacts-published/ml-public-container/ml-build:latest@sha256:9fded8d1413cabb6ef043611cbe446471e842a429e100d96d4ea183f2821e270 # ratchet:us-docker.pkg.dev/ml-oss-artifacts-published/ml-public-container/ml-build:latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
      bap_ref: ${{ steps.resolve_refs.outputs.bap_ref }}
      job_id: ${{ steps.gen_job_id.outputs.job_id }}
    steps:
      - name: Check out user repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # ratchet:actions/checkout@v7.0.0 # zizmor: ignore[unpinned-uses]
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.sha }}
          path: user_repo
          persist-credentials: false

      - name: Generate job ID
        id: gen_job_id
        shell: bash
        env:
          INPUT_JOB_ID: ${{ inputs.job_id }}
        run: |
          echo "::group::Generate job ID"
          set -euo pipefail

          # If user provided a job_id, use it. Otherwise, generate one.
          if [[ -n "$INPUT_JOB_ID" ]]; then
            echo "job_id=$INPUT_JOB_ID" >> "$GITHUB_OUTPUT"
          else
            # Generates 16 bytes of hex (32 chars), equivalent to a UUID length.
            JOB_ID="$(openssl rand -hex 16)"
            echo "Generated Job ID: $JOB_ID"
            echo "job_id=$JOB_ID" >> "$GITHUB_OUTPUT"
          fi

          echo "::endgroup::"

      - name: Resolve git refs
        id: resolve_refs
        shell: bash
        env:
          INPUT_BASELINE: ${{ inputs.baseline_ref }}
          INPUT_EXPERIMENT: ${{ inputs.experiment_ref }}
          IS_PR: ${{ github.event_name == 'pull_request' }}
          PR_BASE: ${{ github.base_ref }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          # If we are in the bap repo itself, use the current SHA.
          # Otherwise, prefer bap_ref, then default to main.
          BAP_REF: ${{ github.repository == 'google-ml-infra/bap' && github.sha || inputs.bap_ref || 'main' }}
          SHA: ${{ github.sha }}
        run: |
          echo "::group::Resolve git refs"
          set -euo pipefail

          # Resolve BAP ref
          echo "bap_ref=$BAP_REF" >> "$GITHUB_OUTPUT"

          # Resolve experiment ref.
          # Default to current SHA if not provided.
          if [[ -z "$INPUT_EXPERIMENT" ]]; then
            EXPERIMENT_REF="$SHA"
          else
            EXPERIMENT_REF="$INPUT_EXPERIMENT"
          fi

          # Resolve baseline ref.
          # Priority order:
          # 1. Manual input (if provided by user)
          # 2. PR base (if triggered by a PR)
          # 3. Default branch (fallback, usually 'main')
          if [[ -n "$INPUT_BASELINE" ]]; then
             BASELINE_REF="$INPUT_BASELINE"
          elif [[ "$IS_PR" == "true" ]]; then
             BASELINE_REF="$PR_BASE"
          else
             BASELINE_REF="$DEFAULT_BRANCH"
          fi

          echo "Resolved git refs: baseline=$BASELINE_REF, experiment=$EXPERIMENT_REF"
          echo "baseline_ref=$BASELINE_REF" >> "$GITHUB_OUTPUT"
          echo "experiment_ref=$EXPERIMENT_REF" >> "$GITHUB_OUTPUT"
          echo "::endgroup::"

      - name: Check out ML actions repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # ratchet:actions/checkout@v7.0.0 # zizmor: ignore[unpinned-uses]
        with:
          repository: "google-ml-infra/bap"
          ref: ${{ steps.resolve_refs.outputs.bap_ref }}
          path: ml_actions
          persist-credentials: false

      - name: Generate benchmark matrix
        env:
          REGISTRY_FILE: ${{ inputs.registry_file }}
          BENCHMARK_FILTER: ${{ inputs.benchmark_filter }}
          ENVIRONMENT_FILTER: ${{ inputs.environment_filter }}
          TAG_FILTER: ${{ inputs.tag_filter }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          AB_MODE: ${{ inputs.ab_mode }}
          BASELINE_REF: ${{ steps.resolve_refs.outputs.baseline_ref }}
          EXPERIMENT_REF: ${{ steps.resolve_refs.outputs.experiment_ref }}
        id: generate
        shell: bash
        working-directory: ml_actions
        run: |
          echo "::group::Generate benchmark matrix"
          set -euo pipefail
          REGISTRY_PATH="$GITHUB_WORKSPACE/user_repo/$REGISTRY_FILE"
          MATRIX_JSON_PATH="$GITHUB_WORKSPACE/matrix.json"
          ARGS=(
            --registry_file="$REGISTRY_PATH"
            --github_event="$GITHUB_EVENT_NAME"
            --ab_mode="$AB_MODE"
            --baseline_ref="$BASELINE_REF"
            --experiment_ref="$EXPERIMENT_REF"
          )

          if [[ -n "$BENCHMARK_FILTER" ]]; then
            ARGS+=(--benchmark_filter="$BENCHMARK_FILTER")
          fi

          if [[ -n "$ENVIRONMENT_FILTER" ]]; then
            ARGS+=(--environment_filter="$ENVIRONMENT_FILTER")
          fi

          if [[ -n "$TAG_FILTER" ]]; then
             ARGS+=(--tag_filter "$TAG_FILTER")
          fi

          MATRIX_JSON="$(bazel run //gh_matrix_generator \
            --noshow_progress \
            --noshow_loading_progress \
            --ui_event_filters=-info \
            -- \
            "${ARGS[@]}" | jq -c '.')"

          echo "$MATRIX_JSON" | jq '.' > "$MATRIX_JSON_PATH"
          echo "matrix_json_path=$MATRIX_JSON_PATH" >> "$GITHUB_OUTPUT"
          echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"
          echo "::endgroup::"

      - name: Upload matrix JSON artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7.0.1 # zizmor: ignore[unpinned-uses]
        with:
          name: shard-matrix-${{ steps.gen_job_id.outputs.job_id }}
          path: ${{ steps.generate.outputs.matrix_json_path }}
          retention-days: 1

  run_benchmarks:
    # For A/B mode, append mode to the job name.
    name: Run benchmark (${{ matrix.config_id }}${{ matrix.ab_test_group && format(' - {0}', matrix.ab_test_group) || '' }})
    needs: generate_matrix
    if: ${{ needs.generate_matrix.outputs.matrix != '[]' }}

    # For A/B mode, conditionally soft fail:
    # If this is a baseline job or a colocated job, continue even if it fails.
    # If this is an experiment-only parallel job (or standard run), failure is fatal.
    continue-on-error: ${{ matrix.ab_test_group == 'BASELINE' || matrix.ab_test_group == 'COLOCATED' }}

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.generate_matrix.outputs.matrix) }}

    runs-on: ${{ matrix.environment_config.runner_label }}
    container:
      image: ${{ matrix.environment_config.container_image }}

    steps:
      - name: Check out ML actions repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # ratchet:actions/checkout@v7.0.0 # zizmor: ignore[unpinned-uses]
        with:
          repository: "google-ml-infra/bap"
          ref: ${{ needs.generate_matrix.outputs.bap_ref }}
          path: ml_actions
          persist-credentials: false

      - name: Set up benchmark environment
        shell: bash
        env:
          CUSTOM_ENV_VARS: ${{ inputs.custom_env_vars }}
        run: |
          echo "::group::Set up benchmark environment"
          set -euo pipefail

          # Create TensorBoard output dir, workload artifacts dir, and metadata dir.
          TENSORBOARD_OUTPUT_DIR="$GITHUB_WORKSPACE/tblogs"
          WORKLOAD_ARTIFACTS_DIR="$GITHUB_WORKSPACE/artifacts"
          WORKLOAD_METADATA_DIR="$GITHUB_WORKSPACE/metadata"
          mkdir -p "$TENSORBOARD_OUTPUT_DIR" "$WORKLOAD_ARTIFACTS_DIR" "$WORKLOAD_METADATA_DIR"

          echo "TENSORBOARD_OUTPUT_DIR: $TENSORBOARD_OUTPUT_DIR"
          echo "WORKLOAD_ARTIFACTS_DIR: $WORKLOAD_ARTIFACTS_DIR"
          echo "WORKLOAD_METADATA_DIR: $WORKLOAD_METADATA_DIR"

          # Export created dirs to GITHUB_ENV.
          {
            echo "TENSORBOARD_OUTPUT_DIR=$TENSORBOARD_OUTPUT_DIR"
            echo "WORKLOAD_ARTIFACTS_DIR=$WORKLOAD_ARTIFACTS_DIR"
            echo "WORKLOAD_METADATA_DIR=$WORKLOAD_METADATA_DIR"
          } >> "$GITHUB_ENV"

          # Inject custom environment variables if provided.
          if [[ -n "$CUSTOM_ENV_VARS" ]]; then
            echo "Injecting custom environment variables..."
            set +x  # Disable command echoing to prevent leaking vars in logs
            while IFS= read -r line || [[ -n "$line" ]]; do
              # Remove leading and trailing whitespace
              line="${line#"${line%%[![:space:]]*}"}"
              line="${line%"${line##*[![:space:]]}"}"

              # Skip empty lines and comments
              [[ -z "$line" || "$line" == \#* ]] && continue

              # Extract variable name (part before the first '=')
              var_name="${line%%=*}"

              # Validate variable name: strictly alphanumeric/underscore, starts with non-digit.
              # This prevents bash array index injection (e.g. foo[$(rm -rf /)])
              # and ensures compatibility with standard env var naming.
              if [[ ! "$var_name" =~ ^[a-zA-Z_][a-zA-Z0-9_]*$ ]]; then
                echo "Error: Invalid environment variable name: $var_name"
                exit 1
              fi

              if [[ -v "$var_name" ]]; then
                echo "Error: Attempted to overwrite existing environment variable: $var_name"
                exit 1
              fi
              printf "%s\n" "$line" >> "$GITHUB_ENV"
            done <<< "$CUSTOM_ENV_VARS"
            set -x  # Re-enable command echoing
          fi

          # Bootstrap Bazel to execute metric collection and regression analysis tooling
          if ! command -v bazel &> /dev/null; then
            echo "Bazel not found. Bootstrapping bazelisk..."
            curl -fSsL -o /usr/local/bin/bazel https://github.com/bazelbuild/bazelisk/releases/download/v1.19.0/bazelisk-linux-amd64
            chmod +x /usr/local/bin/bazel
          else
            echo "Bazel already present: $(command -v bazel)"
          fi

          # Bootstrap GCC (Bazel requires this to auto-configure its C++ toolchain)
          if ! command -v gcc &> /dev/null; then
            echo "GCC not found. Installing build dependencies..."
            if ! apt-get update || ! apt-get install -y gcc g++; then
              echo "Primary install failed, check network or permissions."
              exit 1
            fi
          else
            echo "GCC already present: $(command -v gcc)"
          fi

          echo "::endgroup::"

      - name: Execute workload (baseline)
        id: baseline
        uses: ./ml_actions/actions/execute_benchmark
        with:
          # For A/B Colocated mode, use baseline_ref. For standard A/B, use checkout_ref. Otherwise fall back to SHA.
          checkout_ref: ${{ matrix.baseline_ref || matrix.checkout_ref || github.sha }}
          # In A/B Colocated mode, this first run is the BASELINE.
          artifact_suffix: ${{ matrix.ab_test_group == 'COLOCATED' && '-BASELINE' || (matrix.ab_test_group && format('-{0}', matrix.ab_test_group) || '') }}
          matrix: ${{ toJson(matrix) }}
          job_id: ${{ needs.generate_matrix.outputs.job_id }}
          custom_metadata: ${{ inputs.custom_metadata }}
          results_dir: "${{ github.workspace }}/results"

      - name: Publish results to Pub/Sub
        if: ${{ success() && inputs.publish_metrics && !inputs.ab_mode }}
        env:
          PROJECT_ID: ${{ inputs.pub_sub_gcp_project_id }}
          TOPIC_ID: ${{ inputs.pub_sub_gcp_topic_id }}
          # Path determined by results_dir input in baseline call
          BENCHMARK_RESULTS_DIR: "${{ github.workspace }}/results"
          USER_REPO: ${{ github.repository }}
        shell: bash
        working-directory: ml_actions
        run: |
          echo "::group::Publish results to Pub/Sub"
          set -euo pipefail

          bazel run \
            --noshow_progress \
            --noshow_loading_progress \
            --ui_event_filters=-info \
            //publisher:publish_results -- \
            --project_id="$PROJECT_ID" \
            --topic_id="$TOPIC_ID" \
            --benchmark_results_dir="$BENCHMARK_RESULTS_DIR" \
            --repo_name="$USER_REPO"

          echo "::endgroup::"

      - name: Execute workload (experiment)
        id: experiment
        if: ${{ always() && matrix.ab_test_group == 'COLOCATED' }}
        uses: ./ml_actions/actions/execute_benchmark
        with:
          checkout_ref: ${{ matrix.experiment_ref }}
          artifact_suffix: "-EXPERIMENT"
          matrix: ${{ toJson(matrix) }}
          job_id: ${{ needs.generate_matrix.outputs.job_id }}
          custom_metadata: ${{ inputs.custom_metadata }}
          results_dir: "${{ github.workspace }}/results_experiment"

  analyze_results:
    name: Analyze results
    needs: [generate_matrix, run_benchmarks]
    runs-on: ${{ inputs.runner }}
    container:
      image: us-docker.pkg.dev/ml-oss-artifacts-published/ml-public-container/ml-build:latest@sha256:9fded8d1413cabb6ef043611cbe446471e842a429e100d96d4ea183f2821e270 # ratchet:us-docker.pkg.dev/ml-oss-artifacts-published/ml-public-container/ml-build:latest
    if: always() && !cancelled()
    steps:
      - name: Check out ML actions repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # ratchet:actions/checkout@v7.0.0 # zizmor: ignore[unpinned-uses]
        with:
          repository: "google-ml-infra/bap"
          ref: ${{ needs.generate_matrix.outputs.bap_ref }}
          path: ml_actions
          persist-credentials: false

      - name: Download benchmark results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # ratchet:actions/download-artifact@v8.0.1 # zizmor: ignore[unpinned-uses]
        with:
          # Only download artifacts created in this specific job
          pattern: shard-benchmark-result-*-${{ needs.generate_matrix.outputs.job_id }}
          path: all_results

      - name: Run analyzer
        id: run_analyzer
        env:
          AB_MODE: ${{ inputs.ab_mode }}
          MATRIX_JSON_STR: ${{ needs.generate_matrix.outputs.matrix }}
          REPO_URL: "${{ github.server_url }}/${{ github.repository }}"
          WORKFLOW_NAME: ${{ github.workflow }}
        shell: bash
        working-directory: ml_actions
        run: |
          echo "::group::Run analyzer"
          set -euo pipefail

          RESULTS_DIR="$GITHUB_WORKSPACE/all_results"
          REPORT_FILE="$GITHUB_WORKSPACE/benchmark_report.md"

          if [[ "$AB_MODE" == "true" ]]; then
            bazel run //ab_analyzer \
              --noshow_progress \
              --noshow_loading_progress \
              --ui_event_filters=-info \
              -- \
              --results_dir="$RESULTS_DIR" \
              --matrix_json="$MATRIX_JSON_STR" \
              --output_file="$REPORT_FILE" \
              --repo_url="$REPO_URL" \
              --workflow_name="$WORKFLOW_NAME" || echo "status=FAILURE" >> "$GITHUB_OUTPUT"
          else
            bazel run //static_threshold_analyzer \
              --noshow_progress \
              --noshow_loading_progress \
              --ui_event_filters=-info \
              -- \
              --results_dir="$RESULTS_DIR" \
              --matrix_json="$MATRIX_JSON_STR" \
              --output_file="$REPORT_FILE" \
              --workflow_name="$WORKFLOW_NAME" || echo "status=FAILURE" >> "$GITHUB_OUTPUT"
          fi

          # Set report as job summary
          if [[ -f "$REPORT_FILE" ]]; then
            cat "$REPORT_FILE" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_No report generated due to analysis failure._" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "::endgroup::"

      - name: Upload benchmark report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7.0.1 # zizmor: ignore[unpinned-uses]
        with:
          name: shard-ab-report-${{ needs.generate_matrix.outputs.job_id }}
          path: ${{ github.workspace }}/benchmark_report.md
          retention-days: 1

      - name: Post PR comment
        if: ${{ inputs.post_pr_comment == true && github.event_name == 'pull_request' && !cancelled() }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # ratchet:actions/github-script@v9.0.0 # zizmor: ignore[unpinned-uses]
        env:
          COMMENT_MARKER: ${{ inputs.job_id || github.workflow }}
          REPORT_FILE: ${{ github.workspace }}/benchmark_report.md
        with:
          script: |
            const scriptPath = require('path').resolve('./ml_actions/post_pr_comment/post_pr_comment.js');
            const postComment = require(scriptPath);
            await postComment({ github, context, reportPath: process.env.REPORT_FILE, commentMarker: process.env.COMMENT_MARKER });

      - name: Assert final status
        shell: bash
        env:
          STATUS: ${{ steps.run_analyzer.outputs.status }}
        run: |
          echo "::group::Assert final status"
          set -euo pipefail

          if [[ "$STATUS" == "FAILURE" ]]; then
            echo "[FAILURE] Analyzer detected regressions or missing experiments."
            exit 1
          fi

          echo "::endgroup::"

  bundle_artifacts:
    name: Bundle artifacts
    needs: [generate_matrix, run_benchmarks, analyze_results]
    runs-on: ${{ inputs.runner }}
    container:
      image: us-docker.pkg.dev/ml-oss-artifacts-published/ml-public-container/ml-build:latest@sha256:9fded8d1413cabb6ef043611cbe446471e842a429e100d96d4ea183f2821e270 # ratchet:us-docker.pkg.dev/ml-oss-artifacts-published/ml-public-container/ml-build:latest
    if: ${{ always() }}

    steps:
      - name: Check out ML actions repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # ratchet:actions/checkout@v7.0.0 # zizmor: ignore[unpinned-uses]
        with:
          repository: "google-ml-infra/bap"
          ref: ${{ needs.generate_matrix.outputs.bap_ref }}
          path: ml_actions
          persist-credentials: false

      - name: Download all job artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # ratchet:actions/download-artifact@v8.0.1 # zizmor: ignore[unpinned-uses]
        with:
          pattern: shard-*-${{ needs.generate_matrix.outputs.job_id }}
          path: raw_artifacts

      - name: Run artifact bundler
        env:
          JOB_ID: "${{ needs.generate_matrix.outputs.job_id }}"
        shell: bash
        working-directory: ml_actions
        run: |
          echo "::group::Run artifact bundler"
          set -euo pipefail

          RAW_DIR="$GITHUB_WORKSPACE/raw_artifacts"
          FINAL_DIR="$GITHUB_WORKSPACE/final_artifacts"
          mkdir -p "$FINAL_DIR"

          bazel run //artifact_bundler \
            --noshow_progress \
            --noshow_loading_progress \
            --ui_event_filters=-info \
            -- \
            --raw_dir="$RAW_DIR" \
            --final_dir="$FINAL_DIR" \
            --job_id="$JOB_ID"

          echo "::endgroup::"

      - name: Upload bundled artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7.0.1 # zizmor: ignore[unpinned-uses]
        with:
          name: artifacts-${{ needs.generate_matrix.outputs.job_id }}
          path: final_artifacts/

      - name: Delete temporary artifacts
        uses: geekyeggo/delete-artifact@176a747ab7e287e3ff4787bf8a148716375ca118 # ratchet:geekyeggo/delete-artifact@v6.0.0 # zizmor: ignore[unpinned-uses]
        with:
          name: shard-*-${{ needs.generate_matrix.outputs.job_id }}
          useGlob: true
          failOnError: false
